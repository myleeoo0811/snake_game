<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel" aria-label="Snake game">
        <header class="hud">
          <div>
            <p class="label">Score</p>
            <p id="score" class="value">0</p>
          </div>
          <div>
            <p class="label">Best</p>
            <p id="best-score" class="value">0</p>
          </div>
          <div>
            <p class="label">Status</p>
            <p id="status" class="value">Ready</p>
          </div>
        </header>

        <div class="board-shell">
          <div
            id="board"
            class="board"
            role="grid"
            aria-label="Snake board"
          ></div>

          <div id="overlay" class="overlay">
            <div class="overlay-card">
              <p id="overlay-label" class="label">Snake</p>
              <h1 id="overlay-title" class="overlay-title">Classic Snake</h1>
              <p id="overlay-text" class="overlay-text">
                Pick a difficulty and press start.
              </p>
              <button id="overlay-button" type="button">Start Game</button>
            </div>
          </div>
        </div>

        <p class="hint">
          Arrow keys or WASD to move. Press Space to pause. Press Enter to
          restart.
        </p>

        <div class="settings">
          <label class="setting" for="difficulty-select">
            <span class="label">Difficulty</span>
            <select id="difficulty-select">
              <option value="easy">Easy</option>
              <option value="normal">Normal</option>
              <option value="hard">Hard</option>
            </select>
          </label>
        </div>

        <div class="actions">
          <button id="pause-button" type="button">Pause</button>
          <button id="restart-button" type="button">Restart</button>
          <button id="sound-button" type="button" aria-pressed="true">Sound On</button>
        </div>

        <div class="controls" aria-label="Touch controls">
          <button class="control up" data-direction="up" type="button">Up</button>
          <button class="control left" data-direction="left" type="button">Left</button>
          <button class="control down" data-direction="down" type="button">Down</button>
          <button class="control right" data-direction="right" type="button">Right</button>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
